name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 单元测试和代码质量检查
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 不指定 version，自动读取 package.json 的 packageManager 字段（pnpm@9.0.0）

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run TypeScript check
        run: pnpm ts-check

      - name: Run unit tests with coverage
        run: pnpm test:coverage
        # vitest.config.ts 已配置覆盖率阈值卡点：
        # lines/functions 80、branches 70、statements 80
        # 不达标时 vitest 以非零退出码退出，CI 自动失败

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # E2E测试
  e2e-test:
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm test:install

      - name: Build application
        run: pnpm build

      - name: Start application
        run: |
          pnpm start &
          npx wait-on http://localhost:5000 --timeout 60000

      - name: Run E2E tests
        run: pnpm test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/

  # ============================================================
  # Docker 镜像构建并推送到 GHCR（GitHub Container Registry）
  # 仅 main 分支推送时触发
  # ============================================================
  docker-publish:
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value={{date('YYYYMMDD')}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 自动部署到生产服务器
  # 通过 SSH 连接服务器，拉取最新镜像并滚动更新
  # 需配置 GitHub Secrets（见 docs/04-运维指南/Docker部署指南.md）
  # ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/vnerp' }}
            git pull origin main
            docker compose -f docker-compose.prod.yml --env-file .env.production pull app
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --no-deps --force-recreate app
            echo "等待 app 健康检查..."
            sleep 15
            if docker inspect --format='{{.State.Health.Status}}' vnerp-app-prod 2>/dev/null | grep -q healthy; then
              echo "✅ 部署成功：app 已健康运行"
              docker image prune -f
            else
              echo "⚠️ 警告：app 尚未通过健康检查，请手动检查日志"
              docker compose -f docker-compose.prod.yml logs --tail=50 app
            fi
