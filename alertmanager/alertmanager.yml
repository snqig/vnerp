global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning'
      repeat_interval: 4h

receivers:
  - name: 'default'
    email_configs:
      - to: 'ops-team@your-domain.com'
        from: 'alertmanager@your-domain.com'
        smarthost: 'smtp.your-domain.com:587'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASSWORD}'
        require_tls: true
        send_resolved: true

  - name: 'critical'
    email_configs:
      - to: 'ops-team@your-domain.com'
        from: 'alertmanager@your-domain.com'
        smarthost: 'smtp.your-domain.com:587'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASSWORD}'
        require_tls: true
        send_resolved: true
    # 钉钉通知（需部署 dingtalk-webhook 适配器）
    # webhook_configs:
    #   - url: 'http://dingtalk-webhook:8060/dingtalk/webhook1/send'
    #     send_resolved: true

  - name: 'warning'
    email_configs:
      - to: 'ops-team@your-domain.com'
        from: 'alertmanager@your-domain.com'
        smarthost: 'smtp.your-domain.com:587'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASSWORD}'
        require_tls: true
        send_resolved: true
