# 生产环境 Docker Compose 配置
# 使用: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# 需先构建镜像: docker compose -f docker-compose.prod.yml build

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vnerp-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/vnerpdacahng_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seeds/vnerp-seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=200
      --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vnerp-network

  redis:
    image: redis:7-alpine
    container_name: vnerp-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vnerp-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vnerp-app-prod
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      DEBUG_DB: false
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      REDIS_URL: redis://redis:6379
      PORT: 5000
      HOSTNAME: 0.0.0.0
    ports:
      - "${APP_PORT:-5000}:5000"
    networks:
      - vnerp-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  vnerp-network:
    driver: bridge
