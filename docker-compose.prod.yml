# 生产环境 Docker Compose 配置
# 使用: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# 需先构建镜像: docker compose -f docker-compose.prod.yml build
# 滚动更新: docker compose -f docker-compose.prod.yml up -d --no-deps app

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vnerp-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required}
      MYSQL_USER: ${DB_USER:?DB_USER is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    # 生产环境不对外暴露 MySQL 端口，仅容器内网可达
    # 如需远程维护，通过 SSH 隧道或临时取消注释 ports
    expose:
      - "3306"
    volumes:
      # bind mount：数据落在项目 ./data/mysql 目录，可见、不会被 docker volume prune 清除
      - ./data/mysql:/var/lib/mysql
      - ./database/vnerpdacahng_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seeds/vnerp-seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./backups/mysql:/var/backups
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=500
      --innodb-buffer-pool-size=1G
      --innodb-log-file-size=256M
      --innodb-flush-log-at-trx-commit=1
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/slow.log
      --long-query-time=2
      --log-error=/var/lib/mysql/error.log
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - vnerp-network

  redis:
    image: redis:7-alpine
    container_name: vnerp-redis-prod
    restart: always
    # 生产环境不对外暴露 Redis 端口，仅容器内网可达
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./backups/redis:/var/backups
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    networks:
      - vnerp-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # CI/CD 推送到 GHCR；本地构建时 image 标签被 build 覆盖
    image: ghcr.io/snqig/vnerp:latest
    container_name: vnerp-app-prod
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DEBUG_DB: "false"
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:?CORS_ALLOW_ORIGIN is required}
      REDIS_URL: redis://redis:6379
      PORT: 5000
      HOSTNAME: 0.0.0.0
      APP_VERSION: ${APP_VERSION:-1.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # 生产环境不直接暴露 app 端口，由 nginx 反代
    # 如需调试可取消注释：ports: ["${APP_PORT:-5000}:5000"]
    expose:
      - "5000"
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
      - app_cache:/app/.next/cache
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/api/health', res => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - vnerp-network

  # ============================================================================
  # Nginx 反向代理 — SSL 终结 + 静态缓存 + 限流 + 安全头
  # 项目约束：生产部署必须在 Node.js 前部署反向代理 (Nginx)
  # ============================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: vnerp-nginx-prod
    restart: always
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - vnerp-network

volumes:
  # mysql_data 已改为 bind mount（./data/mysql），无需 named volume 声明
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  app_cache:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local

networks:
  vnerp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
