version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vnerp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-vnerp2026}
      MYSQL_DATABASE: ${DB_NAME:-vnerp}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/vnerpdacahng_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds/vnerp-seed-data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vnerp-network

  # Redis (optional, for caching and token blacklist)
  redis:
    image: redis:7-alpine
    container_name: vnerp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vnerp-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  vnerp-network:
    driver: bridge
